spring:
  main:
    banner-mode: off
  application:
    name: fairy-integration
  config:
    import:
      - optional:nacos:llm_config.${spring.cloud.nacos.config.file-extension}?group=FAIRY_LLM_GROUP&refreshEnabled=true
      - optional:nacos:mcp_client_config.yml?group=FAIRY_MCP_GROUP&refreshEnabled=false
  cloud:
    nacos:
      config:
        server-addr: 139.224.197.83:8848
        namespace: 45a75346-2ee8-446c-8bca-20db580102c4
        file-extension: json
        refresh-enabled: true
        username: nacos
        password: nacos
  ai:
    mcp:
      server:
        name: fairy-mcp-server
        version: 1.0.0
        type: ASYNC
        instructions: "This reactive server provides time information tools and resources"
        protocol: STREAMABLE
        request-timeout: 20s
        streamable-http:
          mcp-endpoint: /mcp
          keep-alive-interval: 30s
          disallow-delete: false

      client:
        enabled: true
        type: async
        request-timeout: 60s