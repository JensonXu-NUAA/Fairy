    zhipuai:
      api-key: f2c394fb2bd74f878b6b7f58dfe31b76.QG7vTWHX5LR0kP7P
      chat:
        options:
          model: glm-4.5-flash
    deepseek:
      api-key: sk-3e92167fab9f415b829c06ba2b9c3660
      chat:
        options:
          model: deepseek-chat

  data:
    redis:
      host: 139.224.197.83
      port: 6379
      password: root
      database: 0
      connect-timeout: 5000ms
      lettuce:
        pool:
          max-active: 8    # 连接池最大连接数
          max-idle: 8      # 连接池最大空闲连接数
          min-idle: 2      # 连接池最小空闲连接数
          max-wait: -1ms   # 连接池最大阻塞等待时间，-1表示不限制

  servlet:
    multipart:
      max-file-size: 10MB        # 单个文件最大大小（支持1MB分片）
      max-request-size: 10MB    # 单次请求最大大小
      enabled: true             # 是否启用 multipart 上传

  datasource:
    url: jdbc:mysql://139.224.197.83:3306/fairy?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: user
    password: user123
    driver-class-name: com.mysql.cj.jdbc.Driver

server:
  port: 12100
  shutdown: graceful

minio:
  endpoint: http://139.224.197.83:9000
  access-key: OMJDLUJTWTJM83Q4IGWQ
  secret-key: XaZwXmVL+lOXKsDwAWy4ljBnp4S9+rD3261mZAbD
  bucket-name: file-upload

rocketmq:
  name-server: 139.224.197.83:9876  # NameServer 地址
  producer:
    group: fairy-file-producer-group  # 生产者组名
    send-message-timeout: 3000  # 发送消息超时时间（毫秒）
    max-message-size: 4194304  # 消息最大大小（字节，4MB）
    retry-times-when-send-failed: 3  # 同步发送失败重试次数
    retry-times-when-send-async-failed: 3  # 异步发送失败重试次数
  consumer:
    group: fairy-file-consumer-group  # 消费者组名

app:
  base-url: localhost:12100

fairy:
  agent:
    default-model: qwen3.5-plus  # Agent 推理默认使用的模型名称
    max-iterations: 10  # ReAct 最大循环迭代次数，防止无限循环消耗 token
    stream-thinking: true  # 是否将 LLM 推理过程（Thought）推送给客户端
    max-history-size: 10  # Agent 会话历史保留的最大轮次
    memory:
      short-term:
        max-messages: 20       # Redis 滑动窗口大小（条）
        ttl-hours: 24          # Redis key 过期时间（小时）
      long-term:
        summarize-threshold: 20   # 触发摘要的消息数阈值
        max-facts-per-user: 50    # MySQL 中每用户保留的最大记忆条数
        model-name: qwen3.5-flash    # 摘要专用模型
      concurrency:
        max-concurrent: 20        # 最大并发 Agent 请求数
        acquire-timeout-ms: 5000  # 等待获取许可的超时时间（毫秒）

logging:
  level:
    cn.nuaa.jensonxu.fairy: debug

bangumi:
  api:
    token: kx9o2KriupdjKiqdLtikedkYydivgwQK18cXKhAa
